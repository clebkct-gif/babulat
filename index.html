<!DOCTYPE html> 
<html lang="pt-BR"> 
<head> 
 <meta charset="UTF-8"> 
 <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
 <title>Placar Tênis - Edição Definitiva Pro</title> 
 <link rel="manifest" href="manifest.json">
 <meta name="theme-color" content="#ffd700">
 
 <style> 
 * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial Black', Gadget, sans-serif; } 
 body, html { width: 100%; height: 100%; background-color: #000; color: #fff; overflow: hidden; } 
 /* --- TELA DE ABERTURA ANIMADA --- */ 
 #intro-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; background: #000; position: absolute; z-index: 20; overflow: hidden; } 
 .universe-container { position: relative; width: 300px; height: 300px; display: flex; align-items: center; justify-content: center; margin-bottom: 40px; perspective: 1000px; } 
 .earth-sphere { width: 80px; height: 80px; background: radial-gradient(circle at 30% 30%, #2b82c9, #051937); border-radius: 50%; box-shadow: 0 0 30px rgba(43, 130, 201, 0.8), inset -10px -10px 20px rgba(0,0,0,0.8); position: relative; animation: rotateEarth 6s linear infinite; z-index: 2; } 
 @keyframes rotateEarth { 0% { transform: rotate(0deg); box-shadow: 0 0 30px rgba(43, 130, 201, 0.8); } 50% { box-shadow: 0 0 45px rgba(43, 130, 201, 1), 0 0 15px rgba(255,255,255,0.2); } 100% { transform: rotate(360deg); box-shadow: 0 0 30px rgba(43, 130, 201, 0.8); } } 
 .orbit { position: absolute; border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 50%; transform-style: preserve-3d; } 
 .orbit-1 { width: 260px; height: 100px; transform: rotateX(60deg) rotateY(30deg); } 
 .orbit-2 { width: 260px; height: 100px; transform: rotateX(60deg) rotateY(-30deg); } 
 .electron-tennis-ball { width: 22px; height: 22px; background: #ccff00; border-radius: 50%; position: absolute; top: 0; left: 50%; margin-left: -11px; margin-top: -11px; box-shadow: 0 0 15px #ccff00, 0 0 30px #ccff00; } 
 .orbit-1 .electron-tennis-ball { animation: orbitAnim1 3s linear infinite; } 
 .orbit-2 .electron-tennis-ball { animation: orbitAnim2 3s linear infinite; animation-delay: -1.5s; } 
 @keyframes orbitAnim1 { 0% { transform: rotateZ(0deg); } 100% { transform: rotateZ(360deg); } } 
 @keyframes orbitAnim2 { 0% { transform: rotateZ(360deg); } 100% { transform: rotateZ(0deg); } } 
 .btn-babulat { padding: 16px 36px; background: transparent; border: 3px solid #ccff00; color: #ccff00; font-size: 20px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; border-radius: 50px; cursor: pointer; box-shadow: 0 0 15px rgba(204, 255, 0, 0.4); transition: all 0.3s ease; position: relative; z-index: 5; } 
 .btn-babulat:hover { background: #ccff00; color: #000; box-shadow: 0 0 30px #ccff00; transform: scale(1.05); } 
 /* --- TELA INICIAL DE CONFIGURAÇÃO --- */ 
 #setup-screen { display: none; flex-direction: column; align-items: center; justify-content: flex-start; width: 100%; height: 100%; background: #222; padding: 20px; overflow-y: auto; position: absolute; z-index: 10; } 
 .setup-container { background: #222; width: 100%; max-width: 800px; padding: 10px; } 
 .header-controls { width: 100%; max-width: 800px; display: flex; flex-direction: row; gap: 6px; margin-bottom: 20px; z-index: 12; } 
 .btn-ui-header { flex: 1; border: none; color: #fff; padding: 14px 4px; border-radius: 8px; cursor: pointer; font-size: 11px; text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px; transition: all 0.3s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.3); text-align: center; } 
 .btn-hist { background: linear-gradient(135deg, #0055ff, #0033aa); border-bottom: 3px solid #002277; } 
 .btn-rank { background: linear-gradient(135deg, #ff9900, #cc6600); border-bottom: 3px solid #994400; } 
 .btn-export { background: linear-gradient(135deg, #00aa50, #007730); border-bottom: 3px solid #005520; } 
 .btn-reset { background: linear-gradient(135deg, #ff3333, #bb1111); border-bottom: 3px solid #770000; } 
 .btn-full { background: linear-gradient(135deg, #666666, #444444); border-bottom: 3px solid #222222; } 
 .btn-ui-header:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(255,255,255,0.1); filter: brightness(1.2); } 
 .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; } 
 .form-group { margin-bottom: 5px; position: relative; } 
 .span-2 { grid-column: span 2; } 
 label { display: block; margin-bottom: 4px; font-size: 13px; color: #aaa; } 
 .input-wrapper { display: flex; gap: 8px; align-items: center; position: relative; } 
 select, input { width: 100%; padding: 11px; background: #333; border: 2px solid #444; color: #fff; border-radius: 8px; font-size: 15px; outline: none; } 
 .select-btn-container { position: relative; display: inline-block; } 
 .btn-list, .btn-clear { background: #444; border: 2px solid #555; color: #fff; padding: 11px 14px; border-radius: 8px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; height: 44px; width: 46px; } 
 .btn-list:hover { background: #555; border-color: #ccff00; } 
 .btn-clear:hover { background: #555; border-color: #ff3333; } 
 .overlay-select { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 10; } 
 .checkbox-group { display: flex; align-items: center; gap: 10px; background: #2a2a2a; padding: 10px; border-radius: 8px; border: 1px solid #444; } 
 .checkbox-group input { width: auto; transform: scale(1.2); } 
 .checkbox-group label { margin-bottom: 0; color: #fff; } 
 .btn-play { width: 100%; padding: 14px; background: #ffcc00; border: none; color: #000; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 25px; text-transform: uppercase; } 
 #last-match-display { margin-top: 25px; text-align: center; color: #fff; font-size: 18px; line-height: 1.6; background: #1a1a1a; padding: 15px; border-radius: 8px; border: 1px dashed #444; } 
 /* --- HISTÓRICO E RANKING --- */ 
 #history-screen, #ranking-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #111; z-index: 30; padding: 30px; overflow-y: auto; } 
 .history-title { font-size: 24px; margin-bottom: 20px; text-transform: uppercase; color: #ffcc00; border-bottom: 2px solid #333; padding-bottom: 10px; } 
 .history-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px; } 
 .history-card { background: #222; border: 1px solid #333; border-radius: 8px; padding: 15px; } 
 .history-meta { font-size: 12px; color: #888; margin-bottom: 6px; } 
 .history-details { font-size: 16px; color: #fff; } 
 .btn-close-ui { background: #ccff00; border: none; color: #000; padding: 12px 24px; font-size: 14px; border-radius: 6px; cursor: pointer; font-weight: bold; text-transform: uppercase; } 
 /* --- TELA DO PLACAR --- */ 
 #scoreboard-screen { display: none; width: 100%; height: 100%; background-color: #000; grid-template-columns: 1fr 1fr; position: relative; } 
 .side-normal { flex-direction: row; } 
 .side-inverted { flex-direction: row-reverse; } 
 .score-zone { display: flex; align-items: center; justify-content: center; height: 100%; cursor: pointer; user-select: none; -webkit-user-select: none; z-index: 1; width: 50%; } 
 .big-score { font-size: 85vh; line-height: 1; font-weight: 900; color: transparent; -webkit-text-stroke: 8px #ffcc00; text-align: center; display: flex; align-items: center; justify-content: center; transform: scaleY(1.33); } 
 .divider { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: rgba(255, 255, 255, 0.08); z-index: 2; } 
 /* --- FILTROS ANIMADOS DA BOLINHA --- */ 
 @keyframes blinkGreen { 0%, 100% { opacity: 0.3; box-shadow: 0 0 6px rgba(204,255,0,0.3); } 50% { opacity: 0.9; box-shadow: 0 0 25px #ccff00, 0 0 40px #ccff00; } } 
 @keyframes blinkRed { 0%, 100% { opacity: 0.3; box-shadow: 0 0 6px rgba(255,0,0,0.3); } 50% { opacity: 0.9; box-shadow: 0 0 25px #ff0000, 0 0 40px #ff0000; } } 
 @keyframes blinkBlueWhite { 0%, 100% { opacity: 0.3; background-color: #0055ff; box-shadow: 0 0 6px rgba(0,85,255,0.3); } 50% { opacity: 0.9; background-color: #ffffff; box-shadow: 0 0 30px #ffffff, 0 0 50px #0055ff; } } 
 #tennis-ball-indicator { position: absolute; width: 25px; height: 25px; border-radius: 50%; z-index: 5; pointer-events: auto; cursor: pointer; transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), left 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform: translate(-50%, -50%); } 
 .state-green { background-color: #ccff00; animation: blinkGreen 1.5s infinite ease-in-out; } 
 .state-red { background-color: #ff0000; animation: blinkRed 0.6s infinite ease-in-out; } 
 .state-blue-white { animation: blinkBlueWhite 0.5s infinite ease-in-out; } 
 /* --- PAINEL FLUTUANTE INFERIOR --- */ 
 .floating-panel { position: absolute; bottom: 0; left: 0; width: 100%; height: 14vh; display: flex; align-items: center; pointer-events: none; z-index: 3; padding-bottom: 5px; } 
 .player-info-floating { display: flex; align-items: center; justify-content: center; gap: 30px; width: 50%; } 
 .player-name { font-size: 5vh; color: transparent; -webkit-text-stroke: 2px #ffffff; white-space: nowrap; overflow: hidden; text-transform: uppercase; text-overflow: ellipsis; max-width: 70%; } 
 .game-score { font-size: 9.6vh; font-weight: 900; color: transparent; -webkit-text-stroke: 3px #ffffff; } 
 </style> 
</head> 
<body> 
 <div id="intro-screen"> 
 <div class="universe-container"> 
 <div class="earth-sphere"></div> 
 <div class="orbit orbit-1"><div class="electron-tennis-ball"></div></div> 
 <div class="orbit orbit-2"><div class="electron-tennis-ball"></div></div> 
 </div> 
 <button class="btn-babulat" onclick="enterAppFullscreen()">Babulat 0.2 12/06/2026</button> </div> 
 <div id="setup-screen"> 
 <div class="header-controls"> 
 <button class="btn-ui-header btn-hist" onclick="openHistoryScreen()">Histórico</button> 
 <button class="btn-ui-header btn-rank" onclick="openRankingScreen()">Ranking</button> 
 <button class="btn-ui-header btn-export" onclick="exportDailyHistoryToTXT()">Salvar</button> 
 <button class="btn-ui-header btn-reset" onclick="secureProtectedReset()">Reset</button> 
 <button class="btn-ui-header btn-full" onclick="requestManualFullscreen()">Full</button> 
 </div> 
 <div class="setup-container"> 
 <div class="form-grid"> 
 <div class="form-group"> 
 <label for="match-type">Modalidade</label> 
 <select id="match-type" onchange="toggleInputs()"> 
 <option value="simples" selected>Simples (1 vs 1)</option> 
 <option value="duplas">Duplas (2 vs 2)</option> 
 </select> 
 </div> 
 <div class="form-group"> 
 <label for="select-sets">Número de Sets</label> 
 <select id="select-sets"> 
 <option value="1" selected>1 Set</option> 
 <option value="2">2 Sets</option> 
 <option value="3">3 Sets</option> 
 <option value="4">4 Sets</option> 
 <option value="5">5 Sets</option> 
 </select> 
 </div> 
 <div class="form-group span-2"> 
 <label id="lbl-p1" for="name-p1">Nome do Jogador 1</label> 
 <div class="input-wrapper"> 
 <input type="text" id="name-p1" oninput="formatInputName(this)" placeholder="Digite ou escolha"> 
 <div class="select-btn-container"> 
 <button type="button" class="btn-list">📋</button> 
 <select id="select-p1" class="overlay-select" onchange="selectPlayerName('name-p1', this)"></select> 
 </div> 
 <button type="button" class="btn-clear" onclick="clearFieldName('name-p1')">🧹</button> 
 </div> 
 </div> 
 <div class="form-group span-2"> 
 <label id="lbl-p2" for="name-p2">Nome do Jogador 2</label> 
 <div class="input-wrapper"> 
 <input type="text" id="name-p2" oninput="formatInputName(this)" placeholder="Digite ou escolha"> 
 <div class="select-btn-container"> 
 <button type="button" class="btn-list">📋</button> 
 <select id="select-p2" class="overlay-select" onchange="selectPlayerName('name-p2', this)"></select> 
 </div> 
 <button type="button" class="btn-clear" onclick="clearFieldName('name-p2')">🧹</button> 
 </div> 
 </div> 
 <div class="form-group"> 
 <label for="select-games">Games por Set</label> 
 <select id="select-games"> 
 <option value="1">1 Game</option> 
 <option value="4" selected>4 Games</option> 
 <option value="6">6 Games</option> 
 </select> 
 </div> 
 <div class="form-group"> 
 <label for="advantage-rule">Vantagem</label> 
 <select id="advantage-rule"> 
 <option value="no-advantage" selected>Sem Vantagem (No-Ad)</option> 
 <option value="advantage">Com Vantagem (Tradicional)</option> 
 </select> 
 </div> 
 <div class="form-group span-2"> 
 <label for="side-change-rule">Troca de Lado de Quadra</label> 
 <select id="side-change-rule"> 
 <option value="never">Nunca Mudar de Lado</option> 
 <option value="every-1">A cada 1 Game concluído</option> 
 <option value="official" selected>Regra Oficial (Soma de Games Ímpar)</option> 
 </select> 
 </div> 
 <div class="form-group span-2"> 
 <label for="initial-server">Quem inicia no Serviço (Saque)?</label> 
 <select id="initial-server"> 
 <option value="1" selected>Jogador 1 / Dupla 1</option> 
 <option value="2">Jogador 2 / Dupla 2</option> 
 </select> 
 </div> 
 <div class="form-group checkbox-group span-2"> 
 <input type="checkbox" id="chk-voice" checked> 
 <label for="chk-voice">Anunciar placar por voz (A cada ponto e fim de game)</label> </div> 
 <div class="form-group checkbox-group span-2"> 
 <input type="checkbox" id="chk-history" checked> 
 <label for="chk-history">Salvar histórico de jogos na memória local</label> </div> 
 </div> 
 <button class="btn-play" onclick="startMatch()">Play</button> 
 <div id="last-match-display"></div> 
 </div> 
 </div> 
 <div id="history-screen"> 
 <h2 class="history-title">Histórico de Partidas</h2> 
 <div id="history-list" class="history-list"></div> 
 <button class="btn-close-ui" onclick="document.getElementById('history-screen').style.display='none'">Fechar</button> </div> 
 <div id="ranking-screen"> 
 <h2 class="history-title">Ranking Geral</h2> 
 <div id="ranking-list" class="history-list"></div> 
 <button class="btn-close-ui" onclick="document.getElementById('ranking-screen').style.display='none'">Fechar</button> </div> 
 <div id="scoreboard-screen" class="side-normal"> 
 <div id="tennis-ball-indicator" class="state-green" onclick="handleBallTap(event)"></div> 
 <div id="zone-p1" class="score-zone" onclick="handleScreenTouch(1)"> 
 <div id="display-score-p1" class="big-score">0</div> 
 </div> 
 <div class="divider"></div> 
 <div id="zone-p2" class="score-zone" onclick="handleScreenTouch(2)"> 
 <div id="display-score-p2" class="big-score">0</div> 
 </div> 
 <div id="floating-panel-container" class="floating-panel side-normal"> 
 <div id="info-block-p1" class="player-info-floating"> 
 <div id="display-name-p1" class="player-name">J1</div> 
 <div id="display-games-p1" class="game-score">0</div> 
 </div> 
 <div id="info-block-p2" class="player-info-floating"> 
 <div id="display-name-p2" class="player-name">J2</div> 
 <div id="display-games-p2" class="game-score">0</div> 
 </div> 
 </div> 
 </div> 

 <script> 
 const RAW_NAMES = ["Ale", "Babu", "Japa", "Chuck da EBF", "Kawane", "Manoel", "Bandite", "Cláudio", "Guto", "Pônei", "Kalel super Girl", "Paulinho", "Melissa", "Nilson", "Edian", "Ricardo", "Yuri", "Pingo", "Walace", "Wilian", "Nilton", "Wellington", "Evelyn", "Gabriel", "Tarzan", "Willon", "Gil", "Alex", "Emilly", "Jenysom", "Luan", "Martins", "Matheus", "Sami Ligeirinho", "Fernando"]; const TENNIS_POINTS = ["0", "15", "30", "40", "Ad"]; let p1Index = 0, p2Index = 0, p1Games = 0, p2Games = 0, p1Sets = 0, p2Sets = 0; let targetGames = 4, targetSets = 1, useAdvantage = false, voiceEnabled = true, saveHistory = true; let currentServer = 1, totalPointsInGame = 0; let sideChangeRule = "official"; let sidesInverted = false; let matchStartTime = null; let ballState = "GREEN"; let ballTimer = null; let previousState = null; window.onload = function() { buildSelectors(); }; function toggleSidesManually() { sidesInverted = !sidesInverted; applySideLayout(); updateDisplay(); speak("Lados invertidos.", function() { announceCurrentScoreAndMatch(); }); } function applySideLayout() { const board = document.getElementById('scoreboard-screen'); const panel = document.getElementById('floating-panel-container'); if (sidesInverted) { board.className = "side-inverted"; panel.className = "floating-panel side-inverted"; } else { board.className = "side-normal"; panel.className = "floating-panel side-normal"; } } function capitalizeText(str) { return str.toLowerCase().replace(/(?:^|\s)\S/g, function(a) { return a.toUpperCase(); }); } function formatInputName(input) { let cursor = input.selectionStart; input.value = capitalizeText(input.value); input.setSelectionRange(cursor, cursor); } function buildSelectors() { const formatted = RAW_NAMES.map(n => capitalizeText(n)); formatted.sort((a, b) => a.localeCompare(b, 'pt', { sensitivity: 'base' })); ['select-p1', 'select-p2'].forEach(id => { const select = document.getElementById(id); select.innerHTML = ""; const defaultOpt = document.createElement('option'); defaultOpt.value = ""; defaultOpt.text = "📋"; defaultOpt.disabled = false; defaultOpt.selected = true; select.appendChild(defaultOpt); formatted.forEach(name => { const opt = document.createElement('option'); opt.value = name; opt.text = name; select.appendChild(opt); }); }); } function selectPlayerName(inputId, selectElem) { if (selectElem.value !== "") { const input = document.getElementById(inputId); input.value = selectElem.value; formatInputName(input); selectElem.value = ""; } } function checkAndForceFullscreen() { const isFull = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement; if (!isFull) { requestManualFullscreen(); } } function requestManualFullscreen() { if (document.documentElement.requestFullscreen) { document.documentElement.requestFullscreen().catch(()=>{}); } else if (document.documentElement.webkitRequestFullscreen) { document.documentElement.webkitRequestFullscreen(); } } function enterAppFullscreen() { requestManualFullscreen(); document.getElementById('intro-screen').style.display = 'none'; document.getElementById('setup-screen').style.display = 'flex'; updateLastMatchUI(); } function updateLastMatchUI() { const lastMatch = JSON.parse(localStorage.getItem('last_match_summary')); const display = document.getElementById('last-match-display'); if (lastMatch) { display.innerHTML = `Último Jogo Placar Final:<br><br><strong>${lastMatch.winner} ${lastMatch.wGames}, ${lastMatch.loser} ${lastMatch.lGames}.</strong>`; } else { display.innerHTML = "Último Jogo Placar Final:<br><br><span style='color:#666;'>Nenhum jogo registrado ainda.</span>"; } } function clearFieldName(id) { document.getElementById(id).value = ""; document.getElementById(id).focus(); } function toggleInputs() { const type = document.getElementById('match-type').value; const text = type === 'duplas' ? "da Dupla" : "do Jogador"; document.getElementById('lbl-p1').innerText = `Nome ${text} 1`; document.getElementById('lbl-p2').innerText = `Nome ${text} 2`; } function setBallState(state) { ballState = state; clearTimeout(ballTimer); const ball = document.getElementById('tennis-ball-indicator'); ball.className = ""; if (state === "GREEN") { ball.classList.add('state-green'); } else if (state === "RED") { ball.classList.add('state-red'); ballTimer = setTimeout(() => { setBallState("GREEN"); }, 3000); } else if (state === "BLUE-WHITE") { ball.classList.add('state-blue-white'); ballTimer = setTimeout(() => { setBallState("GREEN"); }, 4000); } } function saveCurrentState() { previousState = { p1Index: p1Index, p2Index: p2Index, p1Games: p1Games, p2Games: p2Games, p1Sets: p1Sets, p2Sets: p2Sets, currentServer: currentServer, totalPointsInGame: totalPointsInGame, sidesInverted: sidesInverted }; } function startMatch() { const rawP1 = document.getElementById('name-p1').value.trim(); const rawP2 = document.getElementById('name-p2').value.trim(); if (!rawP1 || !rawP2) { alert("Erro: Insira os nomes reais dos jogadores antes de executar a partida!"); speak("Insira o nome dos jogadores."); return; } document.getElementById('display-name-p1').innerText = rawP1; document.getElementById('display-name-p2').innerText = rawP2; targetGames = parseInt(document.getElementById('select-games').value); targetSets = parseInt(document.getElementById('select-sets').value); useAdvantage = document.getElementById('advantage-rule').value === 'advantage'; sideChangeRule = document.getElementById('side-change-rule').value; voiceEnabled = document.getElementById('chk-voice').checked; saveHistory = document.getElementById('chk-history').checked; currentServer = parseInt(document.getElementById('initial-server').value); p1Index = 0; p2Index = 0; p1Games = 0; p2Games = 0; p1Sets = 0; p2Sets = 0; totalPointsInGame = 0; sidesInverted = false; matchStartTime = new Date(); previousState = null; applySideLayout(); document.getElementById('setup-screen').style.display = 'none'; document.getElementById('scoreboard-screen').style.display = 'flex'; setBallState("GREEN"); updateDisplay(); speak("Partida iniciada."); } function speak(text, callback) { if (!voiceEnabled) { if(callback) callback(); return; } window.speechSynthesis.cancel(); const utterance = new SpeechSynthesisUtterance(text); utterance.lang = 'pt-BR'; if (callback) utterance.onend = callback; window.speechSynthesis.speak(utterance); } function handleBallTap(e) { e.stopPropagation(); if (ballState === "BLUE-WHITE") { toggleSidesManually(); return; } if (ballState === "GREEN") { setBallState("RED"); } else if (ballState === "RED") { setBallState("BLUE-WHITE"); } } function handleScreenTouch(player) { checkAndForceFullscreen(); if (ballState === "GREEN") { announceCurrentScoreAndMatch(); return; } if (ballState === "RED") { saveCurrentState(); setBallState("GREEN"); scorePoint(player); return; } if (ballState === "BLUE-WHITE") { setBallState("GREEN"); if (previousState) { p1Index = previousState.p1Index; p2Index = previousState.p2Index; p1Games = previousState.p1Games; p2Games = previousState.p2Games; p1Sets = previousState.p1Sets; p2Sets = previousState.p2Sets; currentServer = previousState.currentServer; totalPointsInGame = previousState.totalPointsInGame; sidesInverted = previousState.sidesInverted; applySideLayout(); updateDisplay(); let txtPlacar = ""; if (p1Index === 3 && p2Index === 3) { txtPlacar = "40 iguais"; } else if (currentServer === 1) { txtPlacar = `${TENNIS_POINTS[p1Index]} a ${TENNIS_POINTS[p2Index]}`; } else { txtPlacar = `${TENNIS_POINTS[p2Index]} a ${TENNIS_POINTS[p1Index]}`; } speak("Voltou para: " + txtPlacar); } else { speak("Não há jogada anterior."); } return; } } function scorePoint(player) { if (player === 1) { if (p1Index === 3 && p2Index === 3) { if (useAdvantage) p1Index = 4; else { winGame(1); return; } } else if (p2Index === 4) p2Index = 3; else if (p1Index === 4 || (p1Index === 3 && p2Index < 3)) { winGame(1); return; } else p1Index++; } else { if (p2Index === 3 && p1
